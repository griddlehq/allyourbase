name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install Admin UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Lint Admin UI source
        working-directory: ui
        run: pnpm exec eslint src/

      - name: Test Admin UI
        working-directory: ui
        run: pnpm test

      - name: Lint unmocked browser test source
        working-directory: ui
        run: npm run lint:browser-tests

      - name: Lint mocked browser test source
        working-directory: ui
        run: npm run lint:browser-tests:mocked

      - name: Check browser coverage matrix
        run: bash scripts/check-coverage-matrix.sh

      - name: Build Admin UI
        working-directory: ui
        run: pnpm build

      - name: Install Playwright Chromium for mocked browser suite
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Run mocked browser suite
        working-directory: ui
        run: pnpm test:browser:mocked

      - name: Upload mocked Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: mocked-playwright-artifacts
          path: |
            ui/playwright-report/
            ui/test-results/
          if-no-files-found: warn

      - name: Build demo apps
        run: |
          cd examples/kanban && npm ci && VITE_AYB_URL="" npx vite build
          cd ../../examples/live-polls && npm ci && VITE_AYB_URL="" npx vite build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Check gofmt
        run: |
          FILES_NEEDING_FMT="$(find . -name '*.go' -type f ! -path './vendor/*' ! -path './_dev/*' -print0 | xargs -0 gofmt -l)"
          test -z "$FILES_NEEDING_FMT" || (echo "Files need formatting:" && echo "$FILES_NEEDING_FMT" && exit 1)

      - name: Lint Go (golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: ./...

      - name: Go file-size guardrail
        run: bash scripts/check-file-sizes.sh

      - name: Generate deadcode report (informational)
        continue-on-error: true
        run: |
          # Informational only: deadcode has no ignore directives and currently reports many baseline findings.
          go install golang.org/x/tools/cmd/deadcode@latest
          "$(go env GOPATH)/bin/deadcode" ./... > deadcode-report.txt

      - name: Upload deadcode report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deadcode-report
          path: deadcode-report.txt
          if-no-files-found: warn

      - name: Build
        run: go build ./cmd/ayb

      - name: Test
        run: go test -race -count=1 ./...

  sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  sdk-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk_go
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

  sdk-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk_python
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ --ignore E501

      - name: Test
        run: pytest

  sdk-dart:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk_dart
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dart-lang/setup-dart@v1

      - name: Get dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test

  sdk-swift:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: sdk_swift
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build library target only
        run: swift build --target Allyourbase

  sdk-kotlin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk_kotlin
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Test
        run: ./gradlew test

  sdk-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install JS SDK dependencies
        run: cd sdk && npm ci

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Test
        working-directory: sdk_react
        run: pnpm install && pnpm test

  sdk-ssr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install JS SDK dependencies
        run: cd sdk && npm ci

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Test
        working-directory: sdk_ssr
        run: pnpm install && pnpm test

  test-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Build Admin UI
        working-directory: ui
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Build demo apps
        run: |
          cd examples/kanban && npm ci && VITE_AYB_URL="" npx vite build
          cd ../../examples/live-polls && npm ci && VITE_AYB_URL="" npx vite build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Integration tests
        run: bash scripts/run-integration-tests.sh

      - name: Supabase schema drift gate
        run: >
          go run ./internal/testutil/cmd/testpg -- go test -p 1 -race -count=1 -tags=integration ./internal/sbmigrate
          -run 'TestE2E_AnalyzeWithoutIsAnonymousColumn|TestE2E_AuthMigrationWithoutIsAnonymousColumn|TestE2E_OAuthMigrationWithoutIdentityDataAndCreatedAt|TestE2E_IntrospectTablesFiltersHostedManagedTables|TestE2E_SchemaMigrationSkipsIncompatibleFKChain'

  # test-cli-e2e runs the 29 CLI end-to-end integration tests as a dedicated
  # signal, in parallel with the broader test-integration suite. The same tests
  # are still included in test-integration (via `./...`); the overlap is
  # intentional for visibility and CI throughput until test-integration is
  # refactored to exclude them.
  test-cli-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ayb_test
          POSTGRES_PASSWORD: ayb_test
          POSTGRES_DB: ayb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Build Admin UI
        working-directory: ui
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Build demo apps
        run: |
          cd examples/kanban && npm ci && VITE_AYB_URL="" npx vite build
          cd ../../examples/live-polls && npm ci && VITE_AYB_URL="" npx vite build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: CLI E2E integration tests
        env:
          TEST_DATABASE_URL: "postgresql://ayb_test:ayb_test@localhost:5432/ayb_test?sslmode=disable"
        run: go tool gotestsum --format testdox -- -race -count=1 -tags=integration -run 'TestCLI_E2E' ./internal/cli/...

  test-browser:
    runs-on: ubuntu-latest
    needs: build
    env:
      AYB_ADMIN_PASSWORD: ${{ format('ci-browser-admin-{0}-{1}', github.run_id, github.run_attempt) }}
      AYB_START_COMMAND: ./ayb start --foreground

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Build Admin UI
        working-directory: ui
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Build demo apps
        run: |
          cd examples/kanban && npm ci && VITE_AYB_URL="" npx vite build
          cd ../../examples/live-polls && npm ci && VITE_AYB_URL="" npx vite build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build AYB binary
        run: go build ./cmd/ayb

      - name: Install Playwright Chromium for unmocked browser suite
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Run unmocked smoke browser suite
        run: |
          bash scripts/run-with-ayb.sh 'cd ui && npm run test:browser -- --project=smoke && bash ../scripts/check-playwright-executed.sh playwright-report/results.json smoke'

      - name: Run unmocked full browser suite (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          bash scripts/run-with-ayb.sh 'cd ui && npm run test:browser -- --project=full && bash ../scripts/check-playwright-executed.sh playwright-report/results.json full'

      - name: Upload unmocked Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unmocked-playwright-artifacts
          path: |
            /tmp/ayb-e2e.log
            ui/playwright-report/
          if-no-files-found: warn

  test-sdk-integration:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    env:
      AYB_START_COMMAND: ./ayb start --foreground
      AYB_STORAGE_ENABLED: "true"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Build Admin UI
        working-directory: ui
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Build demo apps
        run: |
          cd examples/kanban && npm ci && VITE_AYB_URL="" npx vite build
          cd ../../examples/live-polls && npm ci && VITE_AYB_URL="" npx vite build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build AYB binary
        run: go build ./cmd/ayb

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci

      - name: Run SDK integration tests
        run: bash scripts/run-with-ayb.sh 'cd sdk && npm run test:integration'

      - name: Upload SDK integration artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sdk-integration-artifacts
          path: /tmp/ayb-e2e.log
          if-no-files-found: warn
