name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        id: meta
        with:
          images: ghcr.io/griddlehq/allyourbase
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short,prefix=dev-,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Derive build metadata args
        id: build_meta
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ayb_version="${GITHUB_REF_NAME}"
          else
            ayb_version="dev-${GITHUB_SHA::7}"
          fi
          ayb_commit="${GITHUB_SHA}"
          ayb_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf 'version=%s\n' "$ayb_version" >> "$GITHUB_OUTPUT"
          printf 'commit=%s\n' "$ayb_commit" >> "$GITHUB_OUTPUT"
          printf 'date=%s\n' "$ayb_date" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AYB_VERSION=${{ steps.build_meta.outputs.version }}
            AYB_COMMIT=${{ steps.build_meta.outputs.commit }}
            AYB_DATE=${{ steps.build_meta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
